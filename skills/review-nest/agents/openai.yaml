interface:
  display_name: "Nest 工程评审"
  short_description: "评审 Nest 后端工程体系、架构规范与风险治理。"
  default_prompt: "使用 $review-nest 先采用 $review-engineering 的通用工程基线，再读取 review-engineering/stacks/nest.md 的 NestJS/Node.js 专项清单，对当前项目做一次工程评审，并在 docs/reviews/ 下生成或合并评审报告。"

policy:
  allow_implicit_invocation: true
